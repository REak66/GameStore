services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamestore-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5050
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - gamestore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamestore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gamestore-network

volumes:
  uploads_data:

networks:
  gamestore-network:
    driver: bridge
