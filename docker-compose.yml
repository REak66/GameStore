services:
  mongo:
    image: mongo:7
    container_name: gamestore-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - gamestore-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamestore-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5050
      - MONGODB_URI=mongodb://mongo:27017/game_shopping
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    networks:
      - gamestore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamestore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gamestore-network

volumes:
  uploads_data:
  mongo_data:

networks:
  gamestore-network:
    driver: bridge
